<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background-image: url("bgimage.png");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: rgba(255, 255, 255, 0.95);
    width: 420px;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.login-box h2 {
    margin-bottom: 20px;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

.login-box button {
    width: 100%;
    padding: 12px;
    background: #1a73e8;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 15px;
}

#msg {
    color: red;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="userid" placeholder="Login ID">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<script>
function login() {
    var id = document.getElementById("userid").value.trim();
    var pwd = document.getElementById("password").value.trim();

    var users = JSON.parse(localStorage.getItem("users")) || [];

    var validUser = users.find(
        u => u.username === id && u.password === pwd
    );

    if (validUser) {
        window.location.href = "Recruitment.html";
    } else {
        document.getElementById("msg").innerText = "Invalid Login";
    }
}

</script>

</body>
</html>
